<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <a href="index.html">
        <p>Home</p>
    </a>
    <h1>Agendamento para banho e tosa</h1>
    <h2>Nossa equipe irá conferir sua solicitação e enviará uma confirmação para seu email.</h2>
    <form action="">
        <fieldset>
            <br>
            <legend>Identificação do dono do animal</legend>
            <br>
            <div>
                <label for="">Nome:</label>
                <input type="text" name="nome" id="nome" placeholder="Digite o nome completo do dono do animal">
            </div>
            <br>
            <div>
                <label for="">Endereço:</label>
                <input type="text" name="endereco" id="endereco" placeholder="Digite o endereço
                ">
            </div>
            <br>
            <div>
                <label for="">CEP:</label>
                <input type="number" name="cep" id="cep" placeholder="XXXXX-XXX">
            </div>
            <br>
            <div>
                <label for="">Email:</label>
                <input type="email" name="email" id="email" placeholder="Digite o endereço de email">
            </div>
            <br>
            <div>
                <label for="">Tel/Cel:</label>
                <input type="tel" name="tel" id="tel" placeholder="99 99999-9999">
            </div>
        </fieldset>
        <fieldset>
            <legend>Animal</legend>
            <br>
            <div>
                <label for="">Nome:</label>
                <input type="text" name="nome" id="nome" placeholder="Digie o nome do animal">
            </div>
            <br>
            <div>
                <label for="porte">Porte do cão:</label>
                <input type="radio" name="porte" id="pequeno">
                <label for="pequeno">Pequeno</label>
                <input type="radio" name="porte" id="medio">
                <label for="medio">Médio</label>
                <input type="radio" name="porte" id="grande">
                <label for="grande">Grande</label>
            </div>
            <br>
            <div>
                <label for="">Tipo de tosa</label>
                <select name="tipo" id="tipo">
                    <option value="">Nenhuma</option>
                    <option value="opcao1">Opção 1</option>
                    <option value="opcao2">Opção 2</option>
                    <option value="opcao3">Opção 3</option>
                </select>
            </div>
            <br>
            <div>
                <label for="">Observações:</label>
                <br>
                <textarea name="obs" id="obs" cols="100" rows="2"
                    placeholder="Digite alguma informação do animal se necessário"></textarea>

            </div>
            <br>
        </fieldset>
        <fieldset>
            <legend>Horário - Obs: Não atendemos aos domingos e às segundas-feiras</legend>
            <br>
            <div>
                <label for="dias">Indique os dias da semana de sua preferência: <br></label>
                <input type="checkbox" name="dias" id="terca">
                <label for="terca">Terça-Feira</label>

                <input type="checkbox" name="dias" id="quarta">
                <label for="">Quarta-Feira</label>

                <input type="checkbox" name="dias" id="quinta">
                <label for="">Quinta-Feira</label>

                <input type="checkbox" name="dias" id="sexta">
                <label for="">Sexta-Feira</label>

                <input type="checkbox" name="dias" id="sabado">
                <label for="">Sábado</label>
            </div>
            <br>
            <div>
                <label for="">Primeira opção de horário:</label>
                <input type="date" name="primeiro" id="primeiro" placeholder="dd/mm/aaaa">
            </div>
            <br>
            <div>
                <label for="">Segunda opção de horário:</label>
                <input type="date" name="segundo" id="segundo" placeholder="dd/mm/aaaa">
            </div>
            <br>
        </fieldset>
        <a href="obrigado.html"><input type="submit" value="Enviar"></a>

    </form>
</body>

</html>
