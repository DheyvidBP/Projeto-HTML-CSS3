<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Informações Pessoais</h1>
    <fieldset>
        <legend>Cadastro do Cliente</legend>
        <div>
            <p>
                <label for="Nome:">Nome:</label>
                <input type="text" name="Nome:" id="Nome" placeholder="Digite o nome do Cliente">
            </p>
            <p>
                <label for="Idade:">Idade:</label>
                <Input type="number" name="Idade:" id="Idade" placeholder="Digite a Idade">
            </p>
            <p>
                <label for="Endereço:">Endereço:</label>
                <input type="text" name="Endereço:" id="Endereco" placeholder="Digite o Endereço">
            </p>
            <p>
                <label for="Cidade:">Cidade:</label>
                <input type="text" name="Cidade:" id="Cidade" placeholder="Digite a Cidade">
            </p>
            <p>
                <label for="Estado:">Estado:</label>
                <input type="text" name="Estado:" id="Estado" placeholder="UF">
            </p>
            <p>
                <label for="CEP:">CEP:</label>
                <input type="number" name="CEP:" id="CEP" placeholder="XXXXX-XXX">
            </p>
            <P>
            <label for="Tel/Res:">Tel/Res:</label>
            <input type="tel" name="Tel/Res:" id="TelRes" placeholder="99 99999-9999">
            </P>
            <P>
            <label for="Tel/Cel:">Tel/Cel:</label>
            <input type="tel" name="Tel/Cel:" id="TelCel" placeholder="99 99999-9999">
            </P>
            <p>
                <label for="Email:">Email:</label>
                <input type="email" name="Email:" id="Email" placeholder="Digite o Endereço de email">
            </p>
        </div>
    </fieldset>
    <button type="submit">Enviar</button>
</body>

</html>
